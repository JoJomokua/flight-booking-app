<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]>      <html class="no-js"> <!--<![endif]-->
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f9f9f9; 
            margin: 0;
        }

        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 360px; 
            box-sizing: border-box;
        }

        h2 {
            color: green;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* Style Django's default form labels and inputs beautifully */
        p {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 14px;
        }

        input:focus {
            border-color: green;
            outline: none;
        }

        .btn { 
            background: green; 
            color: white; 
            padding: 12px; 
            width: 100%; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 10px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: darkgreen;
        }

        .error-box {
            color: red;
            background-color: #ffe6e6;
            border: 1px solid red;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .footer-text {
            text-align: center; 
            margin-top: 20px; 
            font-size: 14px;
            color: #565656;
        }

        .footer-text a {
            color: green;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
    </head>
    <body>
       <div class="login-card">
        <h2>Log In</h2>

        {% if form.errors %}
            <div class="error-box">
                Your username and password didn't match. Please try again.
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <button type="submit" class="btn">Log In</button>
        </form>

        <div class="footer-text">
            Need an account? <a href="{% url 'signup' %}">Sign Up Here</a>
        </div>
    </div>
        
        <script src="" async defer></script>
    </body>
</html>
